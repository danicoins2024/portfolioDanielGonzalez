<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explora todos los proyectos de software desarrollados por Agustín Daniel González. Buscador interactivo y filtrado por tecnologías.">
  <title>Proyectos - Daniel González Portfolio</title>
  
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="crossorigin">
  
  <!-- Custom stylesheets -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/main.css">
  
  <!-- Web Components scripts -->
  <script type="module" src="js/components/Navbar.js"></script>
  <script type="module" src="js/components/Footer.js"></script>
  <script type="module" src="js/components/ProjectCard.js"></script>
  
  <!-- Main application script -->
  <script type="module" src="js/app.js"></script>
</head>
<body data-page="projects">

  <!-- Reusable Navbar Component -->
  <portfolio-navbar active="projects"></portfolio-navbar>

  <main class="container py-5">
    <!-- Section Header -->
    <div class="section-header">
      <span class="section-label">Trabajos Realizados</span>
      <h1 class="section-title text-gradient">Todos los Proyectos</h1>
      <p class="text-secondary mt-2">
        Una colección de aplicaciones web interactivas y funcionales, con foco en el rendimiento, la accesibilidad y la arquitectura modular.
      </p>
    </div>

    <!-- Filter & Search Bar -->
    <div class="filter-bar">
      <div class="row g-3 align-items-center">
        <!-- Search Field -->
        <div class="col-lg-5">
          <div class="search-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input 
              type="text" 
              class="form-control search-input" 
              id="project-search" 
              placeholder="Buscar por nombre o tecnología..."
              aria-label="Buscar proyectos"
            >
          </div>
        </div>
        
        <!-- Filter Tags -->
        <div class="col-lg-7">
          <div class="d-flex align-items-center flex-wrap gap-2">
            <span class="filter-label">Filtrar por:</span>
            <div class="filter-tags-container" id="filter-tags-container">
              <!-- Dynamically loaded technology filters -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Projects Grid Container -->
    <div class="row" id="projects-grid">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando proyectos...</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Reusable Footer Component -->
  <portfolio-footer></portfolio-footer>

  <!-- Bootstrap Bundle JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6Rz83DNw5M+MNT8B5j7N6jIeHz" crossorigin="crossorigin"></script>
</body>
</html>
